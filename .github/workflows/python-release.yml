name: python-release
on:
  push:
    tags: ['py-*']
  workflow_dispatch: {}
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: astral-sh/setup-uv@v7
      - name: Build sdist and wheel
        working-directory: src/python
        run: uv build
      - name: Publish to PyPI
        working-directory: src/python
        run: uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
